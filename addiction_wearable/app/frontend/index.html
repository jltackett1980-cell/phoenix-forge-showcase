<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>OneMoreDay</title><style>:root{--c:#7F8C8D}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f8f9fa;color:#222}.hdr{background:var(--c);color:#fff;padding:24px 20px}.greet{font-size:18px;opacity:.9;margin-bottom:6px}.name{font-size:28px;font-weight:700}.tag{font-size:13px;opacity:.8;margin-top:4px}.card{background:#fff;margin:16px;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);border-left:4px solid var(--c)}.lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:8px}.focus{font-size:18px;font-weight:600}.chips{margin:0 16px;display:flex;flex-wrap:wrap;gap:8px}.chip{background:#fff;border:1px solid #e0e0e0;border-radius:20px;padding:6px 14px;font-size:13px}.wisdom{margin:16px;padding:16px;background:var(--c);border-radius:12px;color:#fff;font-style:italic;font-size:14px}.btn{display:block;margin:16px;padding:16px;background:var(--c);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;width:calc(100% - 32px);cursor:pointer}.off{text-align:center;font-size:12px;color:#888;padding:8px}</style></head><body><div class="hdr"><div class="greet">One day. That is all we are doing today.</div><div class="name">OneMoreDay</div><div class="tag">One day at a time. You are not alone.</div></div><div class="card"><div class="lbl">Today's Focus</div><div class="focus">Today's commitment</div></div><div class="chips"><div class="chip">Sobriety Counter</div><div class="chip">Craving Tools</div><div class="chip">Offline Support</div><div class="chip">Anonymous Mode</div></div><div class="wisdom">"Every moment is a fresh beginning"</div><button class="btn">Get Started</button><div class="off">Works offline — no account needed</div></body></html>
